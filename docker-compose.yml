version: "3.9"

services:
  postgres_auth_db:
    image: postgres:17
    container_name: pizza_postgres_auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth_service_pizza:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth_service_pizza
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8001
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_auth_db:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8001:8001"
    depends_on:
      postgres_auth_db:
        condition: service_healthy
    volumes:
      - ./auth_service:/app
      - ./common:/app/common

  postgres_profile_db:
    image: postgres:17
    container_name: pizza_postgres_profile
