      delivery_service_pizza:
        condition: service_started
      support_chat_service_pizza:
        condition: service_started
      notification_service_pizza:
        condition: service_started
    volumes:
      - ./gateway_service:/app
      - ./common:/app/common

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_pizza
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

