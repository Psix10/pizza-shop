      JWT_ALGORITHM: HS256
      JWT_ISSUER: auth_service
      JWT_AUDIENCE: internal_api
    ports:
      - "8000:8000"
    depends_on:
      auth_service_pizza:
        condition: service_started
      profile_service_pizza:
        condition: service_started
      catalog_service_pizza:
        condition: service_started
      store_service_pizza:
        condition: service_started
      order_service_pizza:
        condition: service_started
      kitchen_service_pizza:
